<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Legal KG Chatbot</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <style>
    :root {
      --bg: #eef2ff;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --brand: #2563eb;
      --brand-2: #7c3aed;
      --brand-dark: #172554;
      --success: #16a34a;
      --warn: #f59e0b;
      --danger: #dc2626;
      --shadow: 0 24px 70px rgba(15, 23, 42, 0.16);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      min-height: 100vh;
      height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.20), transparent 36%),
        radial-gradient(circle at bottom right, rgba(124, 58, 237, 0.20), transparent 32%),
        linear-gradient(135deg, #eef2ff 0%, #f8fafc 48%, #f5f3ff 100%);
    }

    button, input, textarea, select { font: inherit; }

    .shell {
      width: 100vw;
      height: 100vh;
      min-height: 0;
      margin: 0;
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      background: rgba(255, 255, 255, 0.72);
      border: none;
      border-radius: 0;
      box-shadow: none;
      overflow: hidden;
      backdrop-filter: blur(16px);
    }

    .sidebar {
      color: white;
      padding: 28px;
      min-height: 0;
      overflow-y: auto;
      background:
        linear-gradient(160deg, rgba(15, 23, 42, 0.96), rgba(30, 64, 175, 0.94) 52%, rgba(109, 40, 217, 0.94));
      position: relative;
      overflow: hidden;
    }

    .sidebar::before {
      content: "";
      position: absolute;
      inset: -120px -80px auto auto;
      width: 230px;
      height: 230px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
    }

    .sidebar::after {
      content: "";
      position: absolute;
      left: -80px;
      bottom: -90px;
      width: 220px;
      height: 220px;
      border-radius: 999px;
      background: rgba(96, 165, 250, 0.18);
    }

    .sidebar > * { position: relative; z-index: 1; }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 26px;
    }

    .logo {
      width: 52px;
      height: 52px;
      border-radius: 17px;
      display: grid;
      place-items: center;
      color: #172554;
      font-weight: 900;
      letter-spacing: -0.05em;
      background: linear-gradient(135deg, #bfdbfe, #ffffff);
      box-shadow: 0 14px 32px rgba(37, 99, 235, 0.24);
    }

    .brand h1 {
      margin: 0;
      font-size: 23px;
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .brand p {
      margin: 5px 0 0;
      color: rgba(255, 255, 255, 0.72);
      font-size: 14px;
    }

    .settings-card {
      margin-top: 18px;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.10);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.16);
    }

    .settings-card h3 {
      margin: 0 0 15px;
      font-size: 16px;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 14px 0;
    }

    .setting-row label {
      display: block;
      font-size: 14px;
      font-weight: 700;
    }

    .setting-row small {
      display: block;
      color: rgba(255, 255, 255, 0.66);
      margin-top: 3px;
      line-height: 1.35;
    }

    .switch {
      position: relative;
      width: 52px;
      height: 30px;
      flex: 0 0 auto;
    }

    .switch input { display: none; }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: rgba(255, 255, 255, 0.22);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      transition: 0.2s;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      left: 4px;
      top: 3px;
      border-radius: 999px;
      background: white;
      transition: 0.2s;
      box-shadow: 0 5px 12px rgba(15, 23, 42, 0.24);
    }

    .switch input:checked + .slider { background: #60a5fa; }
    .switch input:checked + .slider::before { transform: translateX(21px); }

    .number-input {
      width: 78px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.14);
      color: white;
      border-radius: 14px;
      padding: 10px 11px;
      outline: none;
    }

    .number-input:focus { border-color: rgba(255,255,255,0.55); }

    .tips {
      margin-top: 20px;
      display: grid;
      gap: 10px;
    }

    .tip {
      padding: 12px 13px;
      border-radius: 17px;
      color: rgba(255,255,255,0.88);
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255,255,255,0.13);
      font-size: 13px;
      line-height: 1.45;
    }

    .main {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      min-width: 0;
      min-height: 0;
      height: 100%;
      background: rgba(248, 250, 252, 0.76);
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 26px 30px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.80);
    }

    .chat-header h2 {
      margin: 0;
      font-size: 25px;
      letter-spacing: -0.04em;
    }

    .chat-header p {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      background: #ecfdf5;
      color: #166534;
      font-weight: 800;
      font-size: 13px;
      white-space: nowrap;
      border: 1px solid #bbf7d0;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 5px rgba(22, 163, 74, 0.10);
    }

    .messages {
      padding: 28px 30px;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .messages::-webkit-scrollbar,
    .sidebar::-webkit-scrollbar { width: 10px; }

    .messages::-webkit-scrollbar-thumb,
    .sidebar::-webkit-scrollbar-thumb {
      background: rgba(100, 116, 139, 0.35);
      border-radius: 999px;
      border: 3px solid transparent;
      background-clip: content-box;
    }

    .message {
      display: grid;
      grid-template-columns: 42px minmax(0, auto);
      gap: 12px;
      max-width: 86%;
      align-items: start;
      animation: pop 0.16s ease-out;
    }

    @keyframes pop {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      grid-template-columns: minmax(0, auto) 42px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 13px;
      color: white;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.20);
    }

    .message.user .avatar {
      grid-column: 2;
      background: linear-gradient(135deg, #0f172a, #334155);
    }

    .bubble {
      padding: 15px 17px;
      border-radius: 20px;
      background: white;
      border: 1px solid var(--line);
      box-shadow: 0 12px 34px rgba(15, 23, 42, 0.06);
      line-height: 1.58;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .message.user .bubble {
      color: white;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border-color: rgba(37, 99, 235, 0.18);
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.20);
      grid-column: 1;
      grid-row: 1;
    }

    details.debug {
      margin-top: 12px;
      border-radius: 14px;
      border: 1px dashed #cbd5e1;
      background: #f8fafc;
      overflow: hidden;
      white-space: normal;
    }

    details.debug summary {
      cursor: pointer;
      padding: 10px 12px;
      color: #334155;
      font-weight: 800;
      font-size: 13px;
    }

    pre {
      margin: 0;
      padding: 12px;
      max-height: 260px;
      overflow: auto;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 12px;
      line-height: 1.45;
    }

    .composer {
      padding: 18px 30px 28px;
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.86);
    }

    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .chip {
      border: 1px solid #dbeafe;
      color: #1e40af;
      background: #eff6ff;
      border-radius: 999px;
      padding: 8px 11px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }

    .input-wrap {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 12px;
    }

    textarea {
      width: 100%;
      min-height: 74px;
      max-height: 180px;
      resize: vertical;
      border: 1px solid #cbd5e1;
      border-radius: 20px;
      padding: 15px 16px;
      outline: none;
      background: #ffffff;
      line-height: 1.5;
    }

    textarea:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.10);
    }

    .send-btn {
      height: 52px;
      border: 0;
      border-radius: 18px;
      padding: 0 22px;
      color: white;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 16px 30px rgba(37, 99, 235, 0.24);
    }

    .send-btn:disabled {
      opacity: 0.56;
      cursor: wait;
    }

    .composer-foot {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .link-btn {
      border: 0;
      background: transparent;
      color: #2563eb;
      cursor: pointer;
      padding: 0;
      font-weight: 800;
    }

    .error-text { color: var(--danger); }

    /* Markdown rendered content */
    .bubble-content { line-height: 1.5; }
    .bubble-content p { margin: 0 0 2px; }
    .bubble-content p:last-child { margin-bottom: 0; }
    .bubble-content ul, .bubble-content ol { margin: 0; padding-left: 18px; }
    .bubble-content li { margin: 0; padding: 0; line-height: 1.5; }
    .bubble-content li p,
    .bubble-content li > p { margin: 0 !important; padding: 0; }
    .bubble-content h1, .bubble-content h2, .bubble-content h3 {
      margin: 8px 0 2px !important;
      font-size: 1em;
      font-weight: 800;
    }
    .bubble-content strong { font-weight: 700; }
    .bubble-content em { font-style: italic; }
    .bubble-content h1, .bubble-content h2, .bubble-content h3 {
      margin: 12px 0 6px;
      font-size: 1em;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .bubble-content code {
      background: rgba(15,23,42,0.07);
      border-radius: 5px;
      padding: 1px 5px;
      font-size: 0.88em;
      font-family: 'Fira Mono', 'Consolas', monospace;
    }
    .bubble-content pre {
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 10px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .bubble-content pre code { background: none; padding: 0; font-size: 0.85em; }
    .bubble-content blockquote {
      border-left: 3px solid #93c5fd;
      margin: 8px 0;
      padding: 4px 12px;
      color: #475569;
      background: #f0f7ff;
      border-radius: 0 8px 8px 0;
    }
    .message.user .bubble-content blockquote { color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.5); }

    /* Điều/Khoản badge */
    .law-ref {
      display: inline-block;
      background: linear-gradient(135deg, #dbeafe, #ede9fe);
      color: #1e40af;
      border: 1px solid #bfdbfe;
      border-radius: 6px;
      padding: 1px 7px;
      font-weight: 700;
      font-size: 0.87em;
      cursor: help;
      transition: background 0.12s, box-shadow 0.12s;
    }
    .law-ref:hover {
      background: linear-gradient(135deg, #bfdbfe, #ddd6fe);
      box-shadow: 0 2px 8px rgba(37,99,235,0.18);
    }
    .message.user .law-ref {
      background: rgba(255,255,255,0.22);
      color: white;
      border-color: rgba(255,255,255,0.4);
    }
    .message.user .law-ref:hover {
      background: rgba(255,255,255,0.35);
    }

    /* Law preview popup */
    #law-popup {
      position: fixed;
      z-index: 9999;
      max-width: 340px;
      min-width: 200px;
      background: #1e293b;
      color: #f1f5f9;
      border-radius: 12px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.32), 0 0 0 1px rgba(255,255,255,0.06);
      padding: 0;
      pointer-events: none;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.14s ease, transform 0.14s ease;
      font-size: 13px;
      line-height: 1.55;
    }
    #law-popup.visible {
      opacity: 1;
      transform: translateY(0);
    }
    #law-popup .lp-header {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 9px 13px 7px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-size: 11.5px;
      font-weight: 800;
      color: #93c5fd;
      letter-spacing: 0.02em;
    }
    #law-popup .lp-body {
      padding: 9px 13px 11px;
      color: #e2e8f0;
      font-weight: 400;
    }
    #law-popup .lp-loading {
      padding: 11px 13px;
      color: #94a3b8;
      font-style: italic;
    }
    #law-popup .lp-empty {
      padding: 11px 13px;
      color: #64748b;
    }
    #law-popup .lp-level {
      padding: 8px 13px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    #law-popup .lp-level:first-child { border-top: none; }
    #law-popup .lp-indent { padding-left: 20px; }
    #law-popup .lp-indent + .lp-indent { padding-left: 30px; }
    #law-popup .lp-level-label {
      display: block;
      font-size: 10.5px;
      font-weight: 800;
      color: #93c5fd;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    #law-popup .lp-level-content {
      display: block;
      color: #e2e8f0;
      font-size: 12.5px;
      line-height: 1.55;
    }
    /* Arrow caret */
    #law-popup::before {
      content: "";
      position: absolute;
      width: 10px;
      height: 10px;
      background: #1e293b;
      transform: rotate(45deg);
      box-shadow: -1px -1px 0 rgba(255,255,255,0.06);
    }
    #law-popup.arrow-down::before {
      bottom: -5px;
      left: var(--arrow-x, 50%);
      transform: translateX(-50%) rotate(45deg);
      box-shadow: 2px 2px 4px rgba(0,0,0,0.15);
    }
    #law-popup.arrow-up::before {
      top: -5px;
      left: var(--arrow-x, 50%);
      transform: translateX(-50%) rotate(45deg);
      box-shadow: -2px -2px 4px rgba(0,0,0,0.08);
    }

    /* Section blocks */
    .section-block {
      margin-top: 10px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(226,232,240,0.8);
    }
    .section-block-header {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 11px;
      background: #f1f5f9;
      font-size: 11.5px;
      font-weight: 800;
      color: #475569;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .section-block-body { padding: 10px 12px; font-size: 13.5px; }



    /* Compact mode: khung chat và chữ nhỏ hơn ~10%, viền mảnh nhất có thể */
    body { font-size: 14.4px; }

    .shell {
      width: 100vw;
      height: 100vh;
      margin: 0;
      grid-template-columns: 220px minmax(0, 1fr);
      border: none;
      border-radius: 0;
      box-shadow: none;
    }

    .sidebar { padding: 16px; }
    .brand { gap: 9px; margin-bottom: 16px; }
    .logo { width: 36px; height: 36px; border-radius: 11px; font-size: 11px; }
    .brand h1 { font-size: 15px; }
    .brand p { font-size: 11px; }

    .settings-card {
      margin-top: 12px;
      padding: 12px;
      border-width: 0.5px;
      border-radius: 14px;
    }
    .settings-card h3 { font-size: 12px; margin-bottom: 10px; }
    .setting-row { gap: 8px; margin: 10px 0; }
    .setting-row label { font-size: 11px; }
    .setting-row small { font-size: 10px; }
    .switch { width: 40px; height: 23px; }
    .slider { border-width: 0.5px; }
    .slider::before { width: 17px; height: 17px; left: 3px; top: 2px; }
    .switch input:checked + .slider::before { transform: translateX(16px); }
    .number-input { width: 52px; padding: 6px 7px; border-width: 0.5px; border-radius: 10px; font-size: 11px; }
    .tips { margin-top: 14px; gap: 7px; }
    .tip { padding: 8px 10px; border-radius: 11px; border-width: 0.5px; font-size: 10.5px; }

    .chat-header {
      padding: 23px 27px 18px;
      border-bottom-width: 0.5px;
    }
    .chat-header h2 { font-size: 22.5px; }
    .chat-header p { font-size: 14.4px; }
    .status { padding: 8px 11px; font-size: 11.7px; border-width: 0.5px; }
    .status-dot { width: 8px; height: 8px; }

    .messages {
      padding: 25px 27px;
      gap: 14px;
    }
    .messages::-webkit-scrollbar,
    .sidebar::-webkit-scrollbar { width: 8px; }
    .messages::-webkit-scrollbar-thumb,
    .sidebar::-webkit-scrollbar-thumb { border-width: 2px; }

    .message {
      grid-template-columns: 38px minmax(0, auto);
      gap: 11px;
      max-width: 82%;
    }
    .message.user { grid-template-columns: minmax(0, auto) 38px; }
    .avatar { width: 38px; height: 38px; border-radius: 14px; font-size: 11.7px; }
    .bubble {
      padding: 13.5px 15px;
      border-radius: 18px;
      border-width: 0.5px;
      line-height: 1.52;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.045);
    }
    .message.user .bubble { box-shadow: 0 10px 24px rgba(37, 99, 235, 0.15); }

    details.debug {
      margin-top: 11px;
      border-radius: 13px;
      border-width: 0.5px;
    }
    details.debug summary { padding: 9px 11px; font-size: 11.7px; }
    pre { padding: 11px; max-height: 234px; font-size: 10.8px; }

    /* ── Evidence panel ─────────────────────────────────────────── */
    .ev-panel { display: flex; flex-direction: column; gap: 10px; padding: 12px 14px; }

    .ev-section { display: flex; flex-direction: column; gap: 5px; }
    .ev-section-title {
      font-size: 10px; font-weight: 800; text-transform: uppercase;
      letter-spacing: .06em; color: #64748b; margin-bottom: 2px;
    }

    /* Confidence bar */
    .ev-conf-row { display: flex; align-items: center; gap: 10px; }
    .ev-conf-bar-wrap { flex: 1; height: 7px; background: #e2e8f0; border-radius: 99px; overflow: hidden; }
    .ev-conf-bar { height: 100%; border-radius: 99px; transition: width .4s; }
    .bar-cao   { background: #16a34a; }
    .bar-tb    { background: #d97706; }
    .bar-thap  { background: #dc2626; }
    .ev-conf-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 99px; font-size: 11px; font-weight: 700;
      white-space: nowrap;
    }
    .lbl-cao  { background: #dcfce7; color: #15803d; }
    .lbl-tb   { background: #fef3c7; color: #92400e; }
    .lbl-thap { background: #fee2e2; color: #991b1b; }

    /* Reference highlight */
    .ev-ref-box {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 10px; border-radius: 8px;
      background: #eff6ff; border: 1px solid #bfdbfe;
      font-size: 12px; font-weight: 700; color: #1e40af;
      width: fit-content;
    }

    /* Tag chips */
    .ev-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .ev-tag {
      padding: 2px 8px; border-radius: 99px; font-size: 10.5px; font-weight: 600;
      background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0;
    }
    .ev-tag.intent { background: #f0fdf4; color: #166534; border-color: #bbf7d0; }
    .ev-tag.domain { background: #fef9c3; color: #854d0e; border-color: #fde68a; }
    .ev-tag.article{ background: #eff6ff; color: #1e40af; border-color: #bfdbfe; }

    /* Context cards */
    .ev-ctx-list { display: flex; flex-direction: column; gap: 5px; }
    .ev-ctx-card {
      padding: 7px 10px; border-radius: 9px;
      border: 1px solid #e2e8f0; background: #f8fafc;
      font-size: 11.5px; line-height: 1.5;
    }
    .ev-ctx-card.highlight { border-color: #bfdbfe; background: #eff6ff; }
    .ev-ctx-top { display: flex; justify-content: space-between; align-items: center; gap: 6px; }
    .ev-ctx-ref { font-weight: 700; color: #1e40af; font-size: 11px; }
    .ev-ctx-score {
      font-size: 10px; color: #64748b;
      background: #e2e8f0; padding: 1px 5px; border-radius: 4px;
    }
    .ev-ctx-title { color: #0f172a; margin-top: 2px; }
    .ev-ctx-kind {
      display: inline-block; font-size: 9.5px; font-weight: 700; text-transform: uppercase;
      padding: 1px 5px; border-radius: 4px; margin-top: 3px;
      background: #e0e7ff; color: #3730a3;
    }

    /* Missing info */
    .ev-missing { padding: 6px 10px; border-radius: 8px; background: #fef2f2; border: 1px solid #fecaca; }
    .ev-missing p { font-size: 11px; color: #991b1b; margin: 0; }

    .composer {
      padding: 16px 27px 25px;
      border-top-width: 0.5px;
    }
    .quick-actions { gap: 7px; margin-bottom: 11px; }
    .chip { padding: 7px 10px; font-size: 11.7px; border-width: 0.5px; }
    .input-wrap { gap: 11px; }
    textarea {
      min-height: 67px;
      max-height: 162px;
      padding: 13.5px 14px;
      border-width: 0.5px;
      border-radius: 18px;
      font-size: 14.4px;
    }
    textarea:focus { box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.08); }
    .send-btn { height: 47px; border-radius: 16px; padding: 0 20px; }
    .composer-foot { margin-top: 9px; font-size: 10.8px; }

    @media (max-width: 860px) {
      .shell {
        width: 100%;
        height: 100dvh;
        min-height: 0;
        margin: 0;
        border-radius: 0;
        grid-template-columns: 1fr;
      }

      .sidebar {
        padding: 20px;
        max-height: 36dvh;
      }

      .settings-card {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0 14px;
      }

      .settings-card h3 { grid-column: 1 / -1; }
      .tips { display: none; }

      .chat-header, .messages, .composer { padding-left: 18px; padding-right: 18px; }
      .message { max-width: 100%; }
    }

    @media (max-width: 560px) {
      .settings-card { grid-template-columns: 1fr; }
      .chat-header { align-items: flex-start; flex-direction: column; }
      .input-wrap { grid-template-columns: 1fr; }
      .send-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div id="law-popup">
    <div class="lp-header" id="lp-header"></div>
    <div id="lp-content"></div>
  </div>

  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">KG</div>
        <div>
          <h1>Legal KG Chat</h1>
          <p>Bộ luật Hình sự Việt Nam</p>
        </div>
      </div>

      <div class="settings-card">
        <h3>Thiết lập</h3>

        <div class="setting-row">
          <div>
            <label for="llmToggle">Bật LLM</label>
            <small>Sử dụng AI local để phân tích sâu</small>
          </div>
          <label class="switch">
            <input id="llmToggle" type="checkbox" />
            <span class="slider"></span>
          </label>
        </div>

        <div class="setting-row">
          <div>
            <label for="topK">Số ứng viên KG</label>
            <small>Số điều/khoản được truy xuất</small>
          </div>
          <input id="topK" class="number-input" type="number" min="1" max="100" value="10" />
        </div>

        <div class="setting-row">
          <div>
            <label for="showK">Kết quả truy xuất hiển thị</label>
            <small>Số evidence/candidate hiển thị</small>
          </div>
          <input id="showK" class="number-input" type="number" min="1" max="100" value="3" />
        </div>
      </div>

    </aside>

    <main class="main">
      <section class="chat-header">
        <div>
          <h2>Trợ lý truy xuất điều luật</h2>
          <p>Nhập tóm tắt vụ án để được phân tích và truy xuất điều luật liên quan.</p>
        </div>
        <div id="status" class="status"><span class="status-dot"></span>Sẵn sàng</div>
      </section>

      <section id="messages" class="messages"></section>

      <section class="composer">
        <div class="input-wrap">
          <textarea id="messageInput" placeholder="Nhập tóm tắt vụ án hoặc câu hỏi pháp luật..."></textarea>
          <button id="sendBtn" class="send-btn" type="button">Gửi</button>
        </div>
        <div class="composer-foot">
          <span>Nhấn Ctrl + Enter để gửi nhanh.</span>
          <button id="clearBtn" class="link-btn" type="button">Xóa hội thoại</button>
        </div>
      </section>
    </main>
  </div>

  <script>
    const messages = document.getElementById('messages');
    const input = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const llmToggle = document.getElementById('llmToggle');
    const topK = document.getElementById('topK');
    const showK = document.getElementById('showK');
    const statusEl = document.getElementById('status');

    function setStatus(text, busy = false) {
      statusEl.innerHTML = `<span class="status-dot"></span>${text}`;
      statusEl.style.background = busy ? '#fffbeb' : '#ecfdf5';
      statusEl.style.color = busy ? '#92400e' : '#166534';
      statusEl.style.borderColor = busy ? '#fde68a' : '#bbf7d0';
    }

    function safeJson(data) {
      try { return JSON.stringify(data, null, 2); }
      catch (_) { return String(data); }
    }

    function trimDebugData(data) {
      if (!data || typeof data !== 'object') return data;
      const limit = Number(showK.value || 3);
      const copy = JSON.parse(JSON.stringify(data));

      for (const key of ['candidates', 'ranked_candidates', 'retrieved', 'results']) {
        if (Array.isArray(copy[key])) copy[key] = copy[key].slice(0, limit);
      }
      if (copy.evidence && Array.isArray(copy.evidence.candidates)) {
        copy.evidence.candidates = copy.evidence.candidates.slice(0, limit);
      }
      return copy;
    }

    // ── Law reference highlighting ────────────────────────────────────────────
    // Matches từ cụ thể nhất → ít cụ thể nhất (order matters for greedy alt)
    // Không dùng \b vì \b không hoạt động với ký tự Unicode tiếng Việt
    const LAW_FULL_PATTERN = /((?:[Đđ]i[eể]m\s+[a-zđ]\s+[Kk]ho[aả]n\s+\d+\s+[Đđ]i[eề]u\s+\d+[a-z]?)|(?:[Kk]ho[aả]n\s+\d+\s+[Đđ]i[eề]u\s+\d+[a-z]?)|(?:[Đđ]i[eề]u\s+\d+[a-z]?\s+[Kk]ho[aả]n\s+\d+\s+[Đđ]i[eể]m\s+[a-zđ])|(?:[Đđ]i[eề]u\s+\d+[a-z]?\s+[Kk]ho[aả]n\s+\d+)|(?:[Đđ]i[eề]u\s+\d+[a-z]?))/g;

    // ── Popup state ───────────────────────────────────────────────────────────
    const popup     = document.getElementById('law-popup');
    const lpHeader  = document.getElementById('lp-header');
    const lpContent = document.getElementById('lp-content');
    const _cache    = {};   // ref text → content string | null
    let   _hideTimer = null;

    function _positionPopup(anchor) {
      const rect   = anchor.getBoundingClientRect();
      const pw     = 340;
      const margin = 10;
      const vw     = window.innerWidth;
      const vh     = window.innerHeight;

      // Horizontal: center on anchor, clamp to viewport
      let left = rect.left + rect.width / 2 - pw / 2;
      left = Math.max(margin, Math.min(left, vw - pw - margin));

      // Arrow offset relative to popup left
      const arrowX = (rect.left + rect.width / 2) - left;

      // Prefer above; fall back to below
      const spaceAbove = rect.top;
      const spaceBelow = vh - rect.bottom;
      let top, arrowDir;

      popup.style.visibility = 'hidden';
      popup.style.display    = 'block';
      const popupH = popup.offsetHeight || 120;
      popup.style.display = '';
      popup.style.visibility = '';

      if (spaceAbove >= popupH + 16 || spaceAbove >= spaceBelow) {
        top      = rect.top - popupH - 12;
        arrowDir = 'arrow-down';
      } else {
        top      = rect.bottom + 12;
        arrowDir = 'arrow-up';
      }

      popup.style.left = left + 'px';
      popup.style.top  = top  + 'px';
      popup.style.setProperty('--arrow-x', arrowX + 'px');
      popup.className  = arrowDir;
    }

    function _showPopup(anchor, refText) {
      clearTimeout(_hideTimer);
      lpHeader.textContent = refText;

      if (_cache[refText] !== undefined) {
        _renderHierarchy(_cache[refText]);
        _positionPopup(anchor);
        popup.classList.add('visible');
      } else {
        lpContent.innerHTML = '<div class="lp-loading">Đang tải nội dung…</div>';
        _positionPopup(anchor);
        popup.classList.add('visible');

        fetch(`/api/law?ref=${encodeURIComponent(refText)}`)
          .then(r => r.json())
          .then(d => {
            _cache[refText] = d.hierarchy || [];
            _renderHierarchy(_cache[refText]);
            _positionPopup(anchor);
          })
          .catch(() => {
            _cache[refText] = [];
            _renderHierarchy([]);
          });
      }
    }

    function _renderHierarchy(hierarchy) {
      if (!hierarchy || hierarchy.length === 0) {
        lpContent.innerHTML = '<div class="lp-empty">Không tìm thấy nội dung điều luật này.</div>';
        return;
      }
      const html = hierarchy.map((item, i) => `
        <div class="lp-level${i > 0 ? ' lp-indent' : ''}">
          <span class="lp-level-label">${_escHtml(item.label)}</span>
          <span class="lp-level-content">${_escHtml(item.content)}</span>
        </div>`).join('');
      lpContent.innerHTML = html;
    }

    function _escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function _hidePopup() {
      _hideTimer = setTimeout(() => popup.classList.remove('visible'), 120);
    }

    // Keep popup alive when cursor moves onto it
    popup.addEventListener('mouseenter', () => clearTimeout(_hideTimer));
    popup.addEventListener('mouseleave', _hidePopup);

    // ── DOM helpers ───────────────────────────────────────────────────────────
    function _wrapLawRef(text, embeddedContent) {
      const span = document.createElement('span');
      span.className = 'law-ref';
      span.textContent = text;
      if (embeddedContent) _cache[text] = embeddedContent;
      return span;
    }

    function applyLawRefsToDOM(container) {
      // 1. Convert <a href="law:content"> links produced by backend template
      container.querySelectorAll('a[href^="law:"]').forEach(a => {
        const refText = a.textContent.trim();
        const content = decodeURIComponent(a.getAttribute('href').slice(4));
        a.replaceWith(_wrapLawRef(refText, content || null));
      });

      // 2. Walk text nodes and wrap remaining law references
      const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, {
        acceptNode(node) {
          if (node.parentElement.closest('.law-ref, code, pre, a')) return NodeFilter.FILTER_REJECT;
          return NodeFilter.FILTER_ACCEPT;
        }
      });
      const textNodes = [];
      while (walker.nextNode()) textNodes.push(walker.currentNode);

      for (const node of textNodes) {
        const text = node.textContent;
        LAW_FULL_PATTERN.lastIndex = 0;
        if (!LAW_FULL_PATTERN.test(text)) continue;
        LAW_FULL_PATTERN.lastIndex = 0;
        const frag = document.createDocumentFragment();
        let last = 0, m;
        while ((m = LAW_FULL_PATTERN.exec(text)) !== null) {
          if (last < m.index) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
          frag.appendChild(_wrapLawRef(m[0].trim(), null));
          last = m.index + m[0].length;
        }
        if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
        node.replaceWith(frag);
      }

      // 3. Attach hover listeners to all newly created .law-ref badges
      container.querySelectorAll('.law-ref').forEach(badge => {
        badge.addEventListener('mouseenter', () => _showPopup(badge, badge.textContent.trim()));
        badge.addEventListener('mouseleave', _hidePopup);
      });
    }

    function _unwrapListParagraphs(container) {
      // marked v9 luôn wrap <li> content trong <p> → gây khoảng trắng thừa
      // Unwrap: <li><p>text</p></li>  →  <li>text</li>
      container.querySelectorAll('li').forEach(li => {
        const kids = Array.from(li.childNodes).filter(n =>
          n.nodeType !== Node.TEXT_NODE || n.textContent.trim()
        );
        if (kids.length === 1 && kids[0].nodeName === 'P') {
          li.innerHTML = kids[0].innerHTML;
        }
      });
    }

    function renderBotContent(text, container) {
      let html;
      if (typeof marked !== 'undefined') {
        marked.setOptions({ breaks: false, gfm: true });
        html = marked.parse(text);
      } else {
        html = `<p>${text.replace(/\n\n+/g, '</p><p>').replace(/\n/g, '<br>')}</p>`;
      }
      container.innerHTML = html;
      _unwrapListParagraphs(container);
      applyLawRefsToDOM(container);
    }

    // ── Evidence panel renderer ───────────────────────────────────────────────
    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function renderEvidencePanel(data) {
      const wrap = document.createElement('div');
      wrap.className = 'ev-panel';

      const ev       = data?.evidence || {};
      const semantic = data?.semantic  || {};
      const cands    = (data?.candidates || []).slice(0, Number(showK.value || 3));
      const stats    = data?.graph_stats || {};

      // ── 1. Phân tích câu hỏi ─────────────────────────────────
      const secQ = mkSection('🔎 Phân tích câu hỏi');

      const tags = document.createElement('div');
      tags.className = 'ev-tags';

      const intent = semantic.intent || '';
      if (intent && intent !== 'UNKNOWN') {
        const intentLabels = {
          LOOKUP_ARTICLE:'Tra cứu điều', LOOKUP_PENALTY:'Hình phạt',
          CLASSIFY_CASE:'Phân loại tội', COMPARE_ARTICLES:'So sánh điều',
          COMPARE_CRIMES:'So sánh tội', LOOKUP_CONDITIONS:'Điều kiện',
          RELATED_ARTICLES:'Điều liên quan',
        };
        tags.appendChild(mkTag(intentLabels[intent] || intent, 'intent'));
      }

      (semantic.domains || []).forEach(d => {
        const domainVi = {homicide:'Xâm phạm tính mạng',robbery:'Cướp tài sản',
          theft:'Trộm cắp',fraud:'Lừa đảo',injury:'Gây thương tích',drugs:'Ma túy'};
        tags.appendChild(mkTag(domainVi[d] || d, 'domain'));
      });

      (semantic.hinted_articles || []).forEach(a =>
        tags.appendChild(mkTag('Điều ' + a, 'article'))
      );

      const entities = semantic.entities || {};
      ['CRIME','ACTION','RESULT','PENALTY','CONDITION'].forEach(k => {
        (entities[k] || []).slice(0,3).forEach(v => tags.appendChild(mkTag(v)));
      });

      if (tags.children.length) secQ.appendChild(tags);
      else secQ.appendChild(mkMuted('Không nhận diện được từ khoá pháp lý rõ ràng.'));
      wrap.appendChild(secQ);

      // ── 2. Căn cứ pháp lý ───────────────────────────────────
      const ref = ev.reference || {};
      if (ref.display) {
        const secR = mkSection('📌 Căn cứ pháp lý');
        const box = document.createElement('div');
        box.className = 'ev-ref-box';
        box.innerHTML = '⚖️ ' + esc(ref.display);
        secR.appendChild(box);

        const artName = (ev.article || {}).name || (ev.target_node || {}).name;
        if (artName) {
          const p = document.createElement('p');
          p.style.cssText = 'margin:4px 0 0;font-size:11.5px;color:#334155';
          p.textContent = artName;
          secR.appendChild(p);
        }
        wrap.appendChild(secR);
      }

      // ── 3. Độ tin cậy ────────────────────────────────────────
      const conf = Number(ev.confidence || 0);
      const confLabel = ev.confidence_label || 'thấp';
      const barCls = confLabel === 'cao' ? 'bar-cao' : confLabel === 'trung bình' ? 'bar-tb' : 'bar-thap';
      const lblCls = confLabel === 'cao' ? 'lbl-cao' : confLabel === 'trung bình' ? 'lbl-tb' : 'lbl-thap';
      const confIcon = confLabel === 'cao' ? '✓' : confLabel === 'trung bình' ? '~' : '!';

      const secC = mkSection('📊 Độ tin cậy');
      const confRow = document.createElement('div');
      confRow.className = 'ev-conf-row';
      confRow.innerHTML = `
        <div class="ev-conf-bar-wrap">
          <div class="ev-conf-bar ${barCls}" style="width:${Math.round(conf*100)}%"></div>
        </div>
        <span class="ev-conf-badge ${lblCls}">${confIcon} ${confLabel} · ${Math.round(conf*100)}%</span>`;
      secC.appendChild(confRow);
      wrap.appendChild(secC);

      // ── 4. Contexts (evidence nodes) ─────────────────────────
      const contexts = (ev.contexts || []).slice(0, Number(showK.value || 3));
      if (contexts.length) {
        const secCtx = mkSection('🗂️ Điều khoản truy xuất (' + contexts.length + ')');
        const list = document.createElement('div');
        list.className = 'ev-ctx-list';
        contexts.forEach(ctx => {
          const ctxRef   = (ctx.reference || {}).display || '';
          const score    = Number(ctx.score || 0).toFixed(3);
          const title    = ctx.title || '';
          const kind     = ctx.node_kind || ctx.label || '';
          const isHigh   = ctx.same_point || ctx.same_clause;
          const card     = document.createElement('div');
          card.className = 'ev-ctx-card' + (isHigh ? ' highlight' : '');
          card.innerHTML = `
            <div class="ev-ctx-top">
              <span class="ev-ctx-ref">${esc(ctxRef) || '—'}</span>
              <span class="ev-ctx-score">${score}</span>
            </div>
            <div class="ev-ctx-title">${esc(title)}</div>
            ${kind ? `<span class="ev-ctx-kind">${esc(kind)}</span>` : ''}`;
          list.appendChild(card);
        });
        secCtx.appendChild(list);
        wrap.appendChild(secCtx);
      }

      // ── 5. Thông tin còn thiếu ────────────────────────────────
      const missing = ev.missing_info || [];
      if (missing.length) {
        const secM = mkSection('❗ Thông tin còn thiếu');
        const box = document.createElement('div');
        box.className = 'ev-missing';
        missing.forEach(m => {
          const p = document.createElement('p');
          p.textContent = m;
          box.appendChild(p);
        });
        secM.appendChild(box);
        wrap.appendChild(secM);
      }

      // ── 6. Candidates (top kết quả retrieval) ────────────────
      if (cands.length) {
        const secCand = mkSection('🏆 Top candidates (' + cands.length + ')');
        const list = document.createElement('div');
        list.className = 'ev-ctx-list';
        cands.forEach((c, i) => {
          const card = document.createElement('div');
          card.className = 'ev-ctx-card';
          const scoreVal = Number(c.score || 0).toFixed(3);
          const src = c.source || '';
          card.innerHTML = `
            <div class="ev-ctx-top">
              <span class="ev-ctx-ref">#${i+1} ${esc(c.title || c.id || '')}</span>
              <span class="ev-ctx-score">${scoreVal}</span>
            </div>
            ${src ? `<span class="ev-ctx-kind">${esc(src)}</span>` : ''}`;
          list.appendChild(card);
        });
        secCand.appendChild(list);
        wrap.appendChild(secCand);
      }

      // ── 7. Graph stats ────────────────────────────────────────
      if (stats.nodes) {
        const p = document.createElement('p');
        p.style.cssText = 'font-size:10px;color:#94a3b8;margin:4px 0 0;text-align:right';
        p.textContent = `KG: ${stats.nodes} nodes · ${stats.edges} edges`;
        wrap.appendChild(p);
      }

      return wrap;
    }

    function mkSection(title) {
      const sec = document.createElement('div');
      sec.className = 'ev-section';
      const h = document.createElement('div');
      h.className = 'ev-section-title';
      h.textContent = title;
      sec.appendChild(h);
      return sec;
    }

    function mkTag(text, cls = '') {
      const span = document.createElement('span');
      span.className = 'ev-tag' + (cls ? ' ' + cls : '');
      span.textContent = text;
      return span;
    }

    function mkMuted(text) {
      const p = document.createElement('p');
      p.style.cssText = 'font-size:11px;color:#94a3b8;margin:0';
      p.textContent = text;
      return p;
    }

    function addMessage(role, text, debugData) {
      const row = document.createElement('div');
      row.className = `message ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'user' ? 'Bạn' : 'KG';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      if (role === 'bot') {
        const content = document.createElement('div');
        content.className = 'bubble-content';
        renderBotContent(text, content);
        bubble.appendChild(content);
      } else {
        bubble.textContent = text;
      }

      if (debugData) {
        const details = document.createElement('details');
        details.className = 'debug';
        const summary = document.createElement('summary');
        summary.textContent = 'Xem evidence / kết quả truy xuất';
        details.appendChild(summary);
        details.appendChild(renderEvidencePanel(debugData));
        bubble.appendChild(details);
      }

      row.appendChild(avatar);
      row.appendChild(bubble);
      messages.appendChild(row);
      row.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    async function sendQuestion() {
      const text = input.value.trim();
      if (!text) return;

      addMessage('user', text);
      input.value = '';
      sendBtn.disabled = true;
      sendBtn.textContent = 'Đang xử lý...';
      setStatus('Đang truy xuất', true);

      const mode = llmToggle.checked ? 'local_llm' : 'no_llm';

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: text,
            mode,
            top_k: Number(topK.value || 5),
            use_llm: llmToggle.checked
          })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || data.error || 'API lỗi');
        addMessage('bot', data.reply || data.answer || 'Không có phản hồi.', data.data || data.evidence || data.error);
      } catch (err) {
        addMessage('bot', 'Không gọi được API: ' + err.message, { error: err.message });
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = 'Gửi';
        setStatus('Sẵn sàng', false);
        input.focus();
      }
    }

    sendBtn.addEventListener('click', sendQuestion);
    input.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && (event.ctrlKey || event.metaKey)) sendQuestion();
    });
    clearBtn.addEventListener('click', () => {
      messages.innerHTML = '';
      addMessage('bot', welcomeText);
    });
    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        input.value = chip.textContent;
        input.focus();
      });
    });

    const welcomeText = 'Xin chào! Tôi là trợ lý pháp lý sử dụng Knowledge Graph. Hãy nhập tóm tắt vụ án hoặc mô tả tình tiết, tôi sẽ:\n\n• Trích xuất các facts từ vụ việc\n• Truy xuất các điều/khoản liên quan trong Bộ luật Hình sự\n• Đề xuất tội danh và khung hình phạt phù hợp';
    addMessage('bot', welcomeText);
  </script>
</body>
</html>
